services:
  - type: web
    name: n8n
    runtime: docker
    dockerfilePath: ./Dockerfile  # or remove this if using the n8n Docker image directly
    plan: starter
    envVars:
      - key: N8N_BASIC_AUTH_ACTIVE
        value: true
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        generateValue: true
      - key: N8N_HOST
        value: your-app-name.onrender.com
      - key: N8N_PORT
        value: 5678
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        value: https://your-app-name.onrender.com/
